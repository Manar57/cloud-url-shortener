server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 1. API Endpoints (Exact or prefix matches take precedence)
    location /shorten {
        proxy_pass http://shortener:5000/shorten;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /stats/ {
        proxy_pass http://shortener:5000; # No trailing URI needed here
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 2. Short Codes (Regex)
    # Added $1 to the end of proxy_pass to ensure the code is sent to the backend
    location ~* "^/([a-zA-Z0-9]{6})$" {
        proxy_pass http://shortener:5000/$1; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 3. Static Files & Frontend Routing
    # This must come after the short-code regex or handle files explicitly
    location / {
        try_files $uri $uri/ /index.html;
    }
}