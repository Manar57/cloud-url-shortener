name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 52.23.39.251
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          debug: true
          script: |
            cd /home/ec2-user/cloud-url-shortener
            git pull
            docker compose down
            docker compose up -d --build